<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circular</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .home-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 60px;
    }
    .home-hero { text-align: center; margin-bottom: 40px; }
    .home-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--color-text);
      margin-bottom: 8px;
    }
    .home-subtitle {
      font-size: 15px;
      color: var(--color-text-muted);
    }
    .home-search-wrap {
      width: 100%;
      max-width: 560px;
      margin-bottom: 48px;
      position: relative;
    }
    .home-search-wrap input[type="search"] {
      width: 100%;
      padding: 13px 20px;
      font-size: 15px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-pill);
      background: var(--color-surface);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      color: var(--color-text);
    }
    .home-search-wrap input[type="search"]:focus {
      border-color: #999;
      box-shadow: 0 0 0 3px rgba(0,0,0,.06);
    }
    .home-tools {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .tools-section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 4px;
      margin-top: 8px;
    }
    .tool-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius);
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    .tool-card:hover {
      border-color: #bbb;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
    }
    .tool-card-inner { flex: 1; min-width: 0; }
    .tool-region {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 4px;
    }
    .tool-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 6px;
    }
    .tool-desc {
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.55;
    }
    .tool-arrow {
      font-size: 18px;
      color: var(--color-text-muted);
      flex-shrink: 0;
      transition: transform .15s;
    }
    .tool-card:hover .tool-arrow { transform: translateX(3px); }
    .home-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--color-text-muted);
      font-size: 14px;
    }
    footer { margin-top: 0; }
    @media (max-width: 600px) {
      .home-wrap { padding: 48px 16px 40px; }
      .home-title { font-size: 28px; }
      .tool-card { padding: 16px 18px; }
    }
  </style>
</head>
<body>
  <main class="home-wrap">
    <div class="home-hero">
      <h1 class="home-title">Circular</h1>
      <p class="home-subtitle">Financial data exploration</p>
    </div>

    <div class="home-search-wrap">
      <input id="home-search" type="search" placeholder="Search tools and datasets…" autocomplete="off">
    </div>

    <div class="home-tools" id="home-tools"></div>
  </main>

  <footer>
    <p>Circular — financial data, openly explored.</p>
  </footer>

  <script>
    const TOOLS = [
      {
        href: 'hkex/',
        region: 'Hong Kong',
        title: 'HKEX Substantial Shareholder Disclosure',
        description: 'Track substantial shareholding disclosures for HKEX-listed companies. Search by stock or shareholder, compare portfolios, and view filing timelines.',
        tags: ['hkex', 'shareholders', 'disclosure', 'di', 'hong kong', 'equity', 'filing'],
      },
    ];

    function renderTools(items) {
      const el = document.getElementById('home-tools');
      if (!items.length) {
        el.innerHTML = '<div class="home-empty">No tools match your search.</div>';
        return;
      }
      // Group by region
      const regions = [...new Set(items.map(t => t.region))];
      el.innerHTML = regions.map(region => {
        const group = items.filter(t => t.region === region);
        return `
          <div class="tools-section-label">${region}</div>
          ${group.map(t => `
            <a class="tool-card" href="${t.href}">
              <div class="tool-card-inner">
                <div class="tool-title">${t.title}</div>
                <div class="tool-desc">${t.description}</div>
              </div>
              <div class="tool-arrow">→</div>
            </a>
          `).join('')}
        `;
      }).join('');
    }

    renderTools(TOOLS);

    document.getElementById('home-search').addEventListener('input', function () {
      const q = this.value.toLowerCase().trim();
      if (!q) { renderTools(TOOLS); return; }
      const filtered = TOOLS.filter(t =>
        t.title.toLowerCase().includes(q) ||
        t.description.toLowerCase().includes(q) ||
        t.region.toLowerCase().includes(q) ||
        t.tags.some(tag => tag.includes(q))
      );
      renderTools(filtered);
    });
  </script>
</body>
</html>
