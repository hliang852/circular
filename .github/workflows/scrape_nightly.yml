name: Nightly DI Scrape

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 22:00 UTC Mon-Fri — incremental nightly run
    - cron: '0 22 6 * *'    # 22:00 UTC on the 6th — full CA rescrape after month-end filing deadline
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6-hour limit for full runs (~600 stocks × 2s)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape DI portal
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          python scripts/scrape_di.py --mode "$MODE"

      - name: Build shareholder index
        run: python scripts/build_index.py

      - name: Resolve CA mode
        id: ca_mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 22 6 * *" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=${{ github.event.inputs.mode || 'incremental' }}" >> $GITHUB_OUTPUT
          fi

      - name: Scrape HK Corporate Actions
        run: python scripts/scrape_ca.py --mode "${{ steps.ca_mode.outputs.mode }}"

      - name: Commit updated data
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          git commit -m "data: nightly DI scrape $(date -u +%Y-%m-%d)"

          MAX_RETRIES=3
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            if git push; then
              echo "Push succeeded"
              exit 0
            fi
            RETRY=$((RETRY + 1))
            echo "Push failed (attempt $RETRY/$MAX_RETRIES); rebasing onto remote and retrying..."
            git fetch origin "$BRANCH"
            if ! git rebase --autostash "origin/$BRANCH"; then
              git rebase --abort || true
              echo "Rebase failed — aborting to avoid overwriting remote changes"
              exit 1
            fi
            sleep $((RETRY * 2))
          done

          echo "All retries exhausted"
          exit 1
